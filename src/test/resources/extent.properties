# ExtentReports TestNG Adapter configuration
# This file must live in src/test/resources/

# Enable the Spark (HTML) reporter
extent.reporter.spark.start=true

# Output path for the HTML report (relative to project root)
extent.reporter.spark.out=test-output/SparkReport/Index.html

# Report title and name shown in the header
extent.reporter.spark.config.report.name=TestNG-Selenium Wikipedia Tests
extent.reporter.spark.config.report.title=Selenium Test Report

# Theme: DARK or STANDARD
extent.reporter.spark.config.theme=DARK

# Timestamp format shown in the report
extent.reporter.spark.config.timeStampFormat=MMM dd, yyyy HH:mm:ss

# Show the full exception stacktrace on failure
extent.reporter.spark.config.encoding=UTF-8