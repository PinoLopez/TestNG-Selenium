# Root handler: send output to console
handlers = java.util.logging.ConsoleHandler
.level = INFO

# Suppress the "Unable to find CDP implementation matching 146" warnings.
# These come from Selenium's CdpVersionFinder and ChromiumDriver because
# Selenium 4.16 does not have a bundled CDP implementation for Chrome 146.
# They are harmless — tests still run correctly — but very noisy.
org.openqa.selenium.devtools.CdpVersionFinder.level = OFF
org.openqa.selenium.chromium.ChromiumDriver.level = OFF